services:
  backend:
    volumes:
      - ./backend:/app:z
      - ./storage:/storage:z
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      # Runtime env so `next dev` exposes the backend URL to browser code —
      # used to bypass the dev-server gzip layer on SSE responses.
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    command: npm run dev
